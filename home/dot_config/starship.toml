# =============================================================================
# starship prompt configuration
# https://starship.rs/config/
# =============================================================================

# 2行プロンプト（最小構成: パス + Git + コマンド時間）
format = """
$username$hostname$directory$git_branch$git_status$git_state$cmd_duration$jobs
$character"""

right_format = """$time"""

# 余分な改行を抑える
add_newline = true

# コマンド実行のタイムアウト
command_timeout = 1000

# -----------------------------------------------------------------------------
# Character (プロンプトの先頭文字)
# -----------------------------------------------------------------------------
[character]
success_symbol = "[❯](bold cyan)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# -----------------------------------------------------------------------------
# Username & Hostname (SSH時のみ表示)
# -----------------------------------------------------------------------------
[username]
show_always = false
format = "[$user]($style)@"
style_user = "yellow bold"
style_root = "red bold"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "green bold"

# -----------------------------------------------------------------------------
# Directory
# -----------------------------------------------------------------------------
[directory]
truncation_length = 0           # 省略しない（フルパス）
truncate_to_repo = false        # リポジトリroot基準で省略しない
format = "[$path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
read_only = " "

# -----------------------------------------------------------------------------
# Git
# -----------------------------------------------------------------------------
[git_branch]
symbol = " "
format = "on [$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

# -----------------------------------------------------------------------------
# Languages / Tools - 全て無効化（必要に応じて個別に有効化）
# -----------------------------------------------------------------------------
[nodejs]
disabled = true

[python]
disabled = true

[golang]
disabled = true

[ruby]
disabled = true

[rust]
disabled = true

[java]
disabled = true

[kotlin]
disabled = true

[lua]
disabled = true

[package]
disabled = true

[docker_context]
disabled = true

[kubernetes]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

# -----------------------------------------------------------------------------
# Command duration & jobs
# -----------------------------------------------------------------------------
[cmd_duration]
min_time = 2_000
format = "took [$duration]($style) "
style = "bold yellow"

[jobs]
symbol = "✦ "
style = "bold blue"
number_threshold = 1
symbol_threshold = 1
format = "[$symbol$number]($style) "

# -----------------------------------------------------------------------------
# Time (右側に表示)
# -----------------------------------------------------------------------------
[time]
disabled = false
time_format = "%H:%M:%S"
format = "[ $time]($style)"
style = "bright-black"

# -----------------------------------------------------------------------------
# Disabled modules (使わないものは無効化)
# -----------------------------------------------------------------------------
[battery]
disabled = true

[memory_usage]
disabled = true

[os]
disabled = true
